name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION_CODE=$(echo $VERSION | sed 's/\.//g')
          BUILD_TIME=$(date '+%Y-%-m-%-d %H:%M')
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle
          sed -i "s/版本 .*/版本 $VERSION release/" www/about.html
          sed -i "s/最后构建时间:.*/最后构建时间:$BUILD_TIME/" www/about.html

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cp android/app/build/outputs/apk/debug/app-debug.apk "school_today_eat-$VERSION.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "school_today_eat-*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
